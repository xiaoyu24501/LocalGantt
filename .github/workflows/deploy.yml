name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # 或者是你的主分支名 master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build # 确保你 package.json 里有 build 命令，并且打包输出目录是 dist
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # 你的打包输出目录
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4