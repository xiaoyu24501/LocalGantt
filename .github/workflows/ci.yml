name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  LocalGantt:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: LocalGantt
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: LocalGantt/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
